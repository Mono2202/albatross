<!DOCTYPE html>
<html lang="en" data-theme="catppuccin">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mono Board</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/logo.png" />
  <meta name="theme-color" content="#1e1e2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MonoVault" />
  <!-- Apply saved theme before any paint to prevent flash -->
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'catppuccin';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <!-- Critical background colours so the page is never white before CSS loads -->
  <style>
    :root                        { background: #1e1e2e; }
    :root[data-theme="dark"]     { background: #1a1a1a; }
    :root[data-theme="light"]    { background: #f5f5f5; }
    body { margin: 0; background: inherit; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
