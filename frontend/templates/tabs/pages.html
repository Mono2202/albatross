<div id="tab-pages" class="tab-panel">
  <div class="tasks-row">
    <div class="card" style="flex:3;min-width:0">
      <div class="pages-search-wrap">
        <input type="text" id="pages-search" placeholder="Search pages…" autocomplete="off" />
        <div id="pages-suggestions" class="workout-suggestions pages-suggestions"></div>
      </div>
      <div id="pages-breadcrumb" class="pages-breadcrumb"></div>
      <div id="pages-content" class="pages-content">
        <div class="empty-state">Search for a page to view it.</div>
      </div>
      <div id="pages-backlinks" class="pages-backlinks"></div>
    </div>
    <div class="pages-side-col">
      <div class="card pages-tree-card">
        <h2 class="pages-panel-header" id="pages-tree-toggle">
          <span>Files</span>
          <span class="pages-panel-chevron">▾</span>
        </h2>
        <div id="pages-tree" class="pages-tree"><div class="empty-state">No pages found.</div></div>
      </div>
      <div class="card">
        <h2>Recent</h2>
        <div id="pages-recent"><div class="empty-state">No pages viewed yet.</div></div>
      </div>
    </div>
  </div>
</div>
